<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - JS Games Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="../../index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Back to Hub
            </a>
            <h1 class="game-title">
                <i class="fas fa-table-tennis"></i>
                Pong
            </h1>
        </header>

        <main class="game-container">
            <div class="game-info">
                <div class="score-board">
                    <div class="score-section">
                        <span class="player-label">Player</span>
                        <span class="score-value" id="playerScore">0</span>
                    </div>
                    <div class="score-section">
                        <span class="player-label">AI</span>
                        <span class="score-value" id="aiScore">0</span>
                    </div>
                </div>
            </div>

            <div class="game-area">
                <canvas id="gameCanvas" width="800" height="400"></canvas>
                <div class="game-overlay" id="gameOverlay">
                    <div class="overlay-content">
                        <h2 id="overlayTitle">Pong</h2>
                        <p id="overlayMessage">Click Start to begin!</p>
                        <button class="btn btn-primary" id="startBtn">
                            <i class="fas fa-play"></i>
                            Start Game
                        </button>
                    </div>
                </div>
            </div>

            <div class="game-controls">
                <div class="speed-slider-group">
                    <label for="speedSlider" class="slider-label">
                        <i class="fas fa-tachometer-alt"></i> 
                        Ball Speed: <span id="speedValue">5</span>
                    </label>
                    <input type="range" min="3" max="10" value="5" step="0.5" id="speedSlider">
                </div>
                
                <div class="difficulty-selector">
                    <label for="difficultySelect">AI Difficulty:</label>
                    <select id="difficultySelect">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                        <option value="expert">Expert</option>
                    </select>
                </div>
                
                <button class="btn btn-secondary" id="pauseBtn" disabled>
                    <i class="fas fa-pause"></i>
                    Pause
                </button>
                <button class="btn btn-secondary" id="resetBtn">
                    <i class="fas fa-redo"></i>
                    Reset
                </button>
            </div>

            <div class="game-instructions">
                <h3>How to Play</h3>
                <div class="instructions-grid">
                    <div class="instruction-item">
                        <i class="fas fa-mouse"></i>
                        <span>Move mouse up/down to control paddle</span>
                    </div>
                    <div class="instruction-item">
                        <i class="fas fa-keyboard"></i>
                        <span>Use W/S or Arrow keys for keyboard control</span>
                    </div>
                    <div class="instruction-item">
                        <i class="fas fa-target"></i>
                        <span>First to 11 points wins the match</span>
                    </div>
                    <div class="instruction-item">
                        <i class="fas fa-bolt"></i>
                        <span>Ball speed increases after each rally</span>
                    </div>
                </div>
            </div>
        </main>

        <div class="stats-panel" id="statsPanel">
            <h3>Game Statistics</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Games Played</span>
                    <span class="stat-value" id="gamesPlayed">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Wins</span>
                    <span class="stat-value" id="playerWins">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Win Rate</span>
                    <span class="stat-value" id="winRate">0%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Longest Rally</span>
                    <span class="stat-value" id="longestRally">0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
