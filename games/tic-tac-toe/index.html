<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - JS Games Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="../../index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Back to Hub
            </a>
            <h1 class="game-title">
                <i class="fas fa-hashtag"></i>
                Tic Tac Toe
            </h1>
        </header>

        <main class="game-container">
            <div class="game-info">
                <div class="score-board">
                    <div class="player-score">
                        <span class="player-label">Player X</span>
                        <span class="score" id="playerXScore">0</span>
                    </div>
                    <div class="current-player">
                        <span id="currentPlayerDisplay">Player X's Turn</span>
                    </div>
                    <div class="player-score">
                        <span class="player-label">Player O</span>
                        <span class="score" id="playerOScore">0</span>
                    </div>
                </div>
            </div>

            <div class="game-board" id="gameBoard">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <div class="game-controls">
                <button class="btn btn-primary" id="restartBtn">
                    <i class="fas fa-redo"></i>
                    New Game
                </button>
                <button class="btn btn-secondary" id="resetScoreBtn">
                    <i class="fas fa-trophy"></i>
                    Reset Score
                </button>
            </div>

            <div class="game-status" id="gameStatus">
                Make your move!
            </div>
        </main>

        <div class="game-overlay" id="gameOverlay">
            <div class="overlay-content">
                <div class="result-icon" id="resultIcon"></div>
                <h2 class="result-text" id="resultText"></h2>
                <p class="result-message" id="resultMessage"></p>
                <button class="btn btn-primary" id="playAgainBtn">
                    <i class="fas fa-play"></i>
                    Play Again
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
