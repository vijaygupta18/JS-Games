<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole - JS Games Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="../../index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Back to Hub
            </a>
            <h1 class="game-title">
                <i class="fas fa-hammer"></i>
                Whack-a-Mole
            </h1>
        </header>

        <main class="game-container">
            <div class="game-info">
                <div class="score-board">
                    <div class="score-item">
                        <span class="score-label">Score</span>
                        <span class="score-value" id="currentScore">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-label">High Score</span>
                        <span class="score-value" id="highScore">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-label">Time Left</span>
                        <span class="score-value" id="timeLeft">60</span>
                    </div>
                </div>
            </div>

            <div class="game-area">
                <div class="mole-grid" id="moleGrid">
                    <div class="hole" data-index="0">
                        <div class="mole" id="mole-0">
                            <i class="fas fa-otter"></i>
                        </div>
                    </div>
                    <div class="hole" data-index="1">
                        <div class="mole" id="mole-1">
                            <i class="fas fa-otter"></i>
                        </div>
                    </div>
                    <div class="hole" data-index="2">
                        <div class="mole" id="mole-2">
                            <i class="fas fa-otter"></i>
                        </div>
                    </div>
                    <div class="hole" data-index="3">
                        <div class="mole" id="mole-3">
                            <i class="fas fa-otter"></i>
                        </div>
                    </div>
                    <div class="hole" data-index="4">
                        <div class="mole" id="mole-4">
                            <i class="fas fa-otter"></i>
                        </div>
                    </div>
                    <div class="hole" data-index="5">
                        <div class="mole" id="mole-5">
                            <i class="fas fa-otter"></i>
                        </div>
                    </div>
                    <div class="hole" data-index="6">
                        <div class="mole" id="mole-6">
                            <i class="fas fa-otter"></i>
                        </div>
                    </div>
                    <div class="hole" data-index="7">
                        <div class="mole" id="mole-7">
                            <i class="fas fa-otter"></i>
                        </div>
                    </div>
                    <div class="hole" data-index="8">
                        <div class="mole" id="mole-8">
                            <i class="fas fa-otter"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="game-controls">
                <button class="btn btn-primary" id="startBtn">
                    <i class="fas fa-play"></i>
                    Start Game
                </button>
                <button class="btn btn-secondary" id="pauseBtn" disabled>
                    <i class="fas fa-pause"></i>
                    Pause
                </button>
                <button class="btn btn-secondary" id="resetBtn">
                    <i class="fas fa-redo"></i>
                    Reset
                </button>
            </div>

            <div class="game-instructions">
                <h3>How to Play</h3>
                <div class="instructions-grid">
                    <div class="instruction-item">
                        <i class="fas fa-mouse-pointer"></i>
                        <span>Click on moles as they pop up</span>
                    </div>
                    <div class="instruction-item">
                        <i class="fas fa-clock"></i>
                        <span>You have 60 seconds to score</span>
                    </div>
                    <div class="instruction-item">
                        <i class="fas fa-target"></i>
                        <span>Each hit scores 10 points</span>
                    </div>
                    <div class="instruction-item">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>Moles appear faster as you progress</span>
                    </div>
                </div>
            </div>
        </main>

        <div class="game-overlay" id="gameOverlay">
            <div class="overlay-content">
                <div class="result-icon" id="resultIcon">
                    <i class="fas fa-flag-checkered"></i>
                </div>
                <h2 class="result-text" id="resultText">Time's Up!</h2>
                <p class="result-message" id="resultMessage">Great job!</p>
                <div class="final-score">
                    <span>Final Score: <strong id="finalScore">0</strong></span>
                </div>
                <button class="btn btn-primary" id="playAgainBtn">
                    <i class="fas fa-play"></i>
                    Play Again
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
